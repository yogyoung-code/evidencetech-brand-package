<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepEvidence Logo Animation</title>
    <!-- 引入 Teko 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* 纯白背景 */
            font-family: 'Teko', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* SVG 图标容器 - 30px, 向上移动 */
        .icon-wrapper {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -8px;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* 路径样式 */
        .logo-path {
            fill: none;
            stroke: #2563EB; /* DE primary (Tailwind blue-600) — updated 2026-05-07 from #2c65c9 to align with brand kit token --de-primary */
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;

            stroke-dasharray: var(--path-length) var(--path-length);
            stroke-dashoffset: var(--path-length);

            /* 动画：时长 1.2s，缓动函数，只播放一次，最后停留在结束状态 */
            animation: drawLine 1.2s ease-out forwards;
        }

        /* 描边动画：从隐藏到完全显示 */
        @keyframes drawLine {
            from {
                stroke-dashoffset: var(--path-length);
            }
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 文字部分 - 28px */
        .text-wrapper {
            font-size: 28px;
            line-height: 0.85;
            text-transform: none;
            display: flex;
            align-items: baseline;
            opacity: 0;
            transform: translateX(-10px);

            /* 文字进场动画 */
            animation: fadeInText 0.8s ease-out forwards;
            animation-delay: 0.8s;

            user-select: none;
        }

        /* 文字具体颜色 */
        .text-deep {
            color: #2563EB; /* DE primary — updated 2026-05-07 from #2c65c9 */
            font-weight: 600;
        }

        .text-evidence {
            color: #000000;
            font-weight: 600;
        }

        /* 文字进场关键帧 */
        @keyframes fadeInText {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24">
                <!--
                     已重构路径数据 (d属性) - 镜像版本
                     X坐标翻转 (x -> 24-x)，路径顺序重排以保持从左到右绘制
                     M 2 12 ... H 22
                -->
                <path
                    class="logo-path"
                    d="M 2 12 H 4.48 A 2 2 0 0 1 6.41 13.46 L 8.76 21.82 A 0.25 0.25 0 0 0 9.24 21.82 L 14.76 2.18 A 0.25 0.25 0 0 1 15.24 2.18 L 17.59 10.54 A 2 2 0 0 0 19.51 12 H 22"
                    transform="translate(0, 3)"
                ></path>
            </svg>
        </div>

        <div class="text-wrapper">
            <span class="text-deep">Deep</span><span class="text-evidence">Evidence</span>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const path = document.querySelector('.logo-path');
            if (path) {
                const length = path.getTotalLength();
                // 设置 CSS 变量用于动画
                path.style.setProperty('--path-length', length);
            }
        });
    </script>

</body>
</html>
