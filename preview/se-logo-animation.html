<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekEvidence 品牌动效</title>
    <!-- 引入 Teko 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* SE primary updated 2026-05-07 from #893BE1 to align with brand kit token --se-primary */
            --primary-purple: #9333EA;
            /* Secondary purple (was #893CE1, likely a typo of #893BE1) consolidated to single SE primary */
            --secondary-purple: #9333EA;
            --text-black: #000000;
            --anim-duration: 0.8s;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: transparent; /* 背景透明 */
            font-family: 'Teko', sans-serif;
        }

        /* 整体容器：图标和文字并排 */
        .brand-container {
            display: flex;
            align-items: center;
            gap: 28px; /* 增加间距以防视觉拥挤 */
        }

        /* SVG 容器大小控制 */
        .svg-container {
            width: 150px; /* 略微增加宽度以保证完整显示 */
            height: auto;
            display: flex;
            align-items: center;
            overflow: visible; /* 确保不裁剪 */
        }

        svg {
            overflow: visible; /* 确保 SVG 内部变换不被裁剪 */
            width: 100%;
            height: 100%;
        }

        /* 图标基础动效 */
        .wave-bar {
            opacity: 0;
            transform-origin: center;
            animation: wakeUp var(--anim-duration) cubic-bezier(0.34, 1.56, 0.64, 1) 1 forwards;
        }

        @keyframes wakeUp {
            0% {
                opacity: 0;
                transform: scaleY(0.3) scaleX(0.9);
            }
            100% {
                opacity: 1;
                transform: scaleY(1) scaleX(1);
            }
        }

        /* 图标交错延迟：从中间向两侧唤醒 */
        .bar-middle { animation-delay: 0.0s; }
        .bar-long-left, .bar-long-right { animation-delay: 0.15s; }
        .bar-short-left, .bar-short-right { animation-delay: 0.3s; }

        /* 文字容器样式 */
        .brand-text {
            font-size: 88px;
            line-height: 0.8;
            display: flex;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-30px);
            /* 文字滑入动效时长为 1.0s */
            animation: textReveal 1.0s cubic-bezier(0.22, 1, 0.36, 1) 0.6s 1 forwards;
        }

        @keyframes textReveal {
            0% {
                opacity: 0;
                transform: translateX(-30px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .text-seek {
            color: var(--primary-purple);
        }

        .text-evidence {
            color: var(--text-black);
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <!-- 图标部分 -->
        <div class="svg-container">
            <!-- 进一步扩大 viewBox (从 30 25 255 160 改为 20 20 280 170) 以彻底解决边缘裁剪问题 -->

                <!-- 1. 左一短柱 -->

                <!-- 5. 右侧短柱 (修正裁剪问题的条柱) -->
                <path class="wave-bar bar-short-right" fill="#9333EA"
                    d="M277.909271,117.887894 C279.114777,133.678619 266.966919,143.677826 252.203125,140.368973 C243.210953,138.353622 237.279022,130.970016 237.128784,121.669685 C236.962051,111.347244 236.995239,101.019814 237.075226,90.695595 C237.167633,78.766380 245.310638,70.806404 257.299011,70.750893 C269.317535,70.695244 277.563873,78.471008 277.833160,90.428833 C278.035553,99.417221 277.896118,108.413300 277.909271,117.887894 Z"/>
            </svg>
        </div>

        <!-- 文字部分（2026-05-07 修订：原文件错误使用 "Deep"+"Evidence"，已修正为 "Seek"+"Evidence"；
             类名 .text-deep 同步改为 .text-seek） -->
        <div class="brand-text">
            <span class="text-seek">Seek</span>
            <span class="text-evidence">Evidence</span>
        </div>
    </div>

</body>
</html>
